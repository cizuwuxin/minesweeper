<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#6750A4">
<title>Material 3 扫雷</title>
<meta name="description" content="Material Design 3 风格扫雷游戏，零依赖单文件。">
<style>
:root{color-scheme:light dark;--bg:#fef7ff;--fg:#1d1b20;--primary:#6750A4;--secondary:#625B71;--tertiary:#7D5260;--muted:#49454F}
@media (prefers-color-scheme:dark){:root{--bg:#141218;--fg:#e6e0e9;--primary:#d0bcff;--secondary:#ccc2dc;--tertiary:#efb8c8;--muted:#938f99}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Roboto','Noto Sans SC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--fg);display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{max-width:520px;width:100%;background:color-mix(in srgb,var(--fg) 6%,transparent);border:1px solid color-mix(in srgb,var(--fg) 12%,transparent);border-radius:24px;padding:32px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
h1{font-size:32px;font-weight:500;letter-spacing:.5px;margin-bottom:8px;color:var(--primary)}
.tagline{font-size:15px;line-height:1.5;color:var(--muted);margin-bottom:24px}
.tagline b{color:var(--fg);font-weight:500}
.btn{display:inline-block;background:var(--primary);color:#fff;text-decoration:none;padding:14px 28px;border-radius:100px;font-weight:500;font-size:15px;margin:6px;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px color-mix(in srgb,var(--primary) 30%,transparent)}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px color-mix(in srgb,var(--primary) 40%,transparent)}
.btn:active{transform:translateY(0)}
.btn.secondary{background:transparent;color:var(--primary);border:1px solid var(--primary);box-shadow:none}
.features{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:24px;text-align:left}
.feature{padding:12px;background:color-mix(in srgb,var(--fg) 4%,transparent);border-radius:12px;font-size:13px;line-height:1.4}
.feature b{display:block;color:var(--primary);font-size:14px;margin-bottom:2px}
.foot{margin-top:24px;font-size:12px;color:var(--muted)}
.foot a{color:var(--primary);text-decoration:none}
@media(max-width:480px){.features{grid-template-columns:1fr}h1{font-size:26px}}
</style>
</head>
<body>
<main class="card">
<h1>💣 扫雷</h1>
<p class="tagline">用 <b>Material Design 3</b> 重写的单文件扫雷游戏。<br>零依赖、零安装、自动适配深色主题。</p>
<a class="btn" href="./saolei.html">▶ 立即开始游戏</a>
<a class="btn secondary" href="https://github.com/cizuwuxin/saolei">⭐ Star on GitHub</a>
<div class="features">
<div class="feature"><b>🧠 智能无猜</b>CSP 求解器自动找出能确定的格子</div>
<div class="feature"><b>⚡ 并行求解</b>Web Worker 池不卡界面</div>
<div class="feature"><b>📱 完美触屏</b>长按插旗 / 双击展开</div>
<div class="feature"><b>🎨 Material 3</b>完整配色 token 系统</div>
</div>
<p class="foot">由 <a href="https://github.com/cizuwuxin">@cizuwuxin</a> 用 ❤️ 制作 · <a href="https://github.com/cizuwuxin/saolei/blob/main/LICENSE">MIT</a></p>
</main>
</body>
</html>
